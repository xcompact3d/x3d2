stages:
  - build-and-test
  - check-policies
  - build-docs

.build-and-test-template: &build-and-test-template
  #image: ubuntu-20.04
  stage: build-and-test
  timeout: 1h
  variables:
  script:
    - echo Failure!
    - exit 1

.check-formatting-template: &check-formatting-template
  #image: ubuntu-latest
  stage: check-policies
  variables:
  before_script:
  script:
    - echo Failure!
    - exit 1
  allow_failure: false
  timeout: 15m

.build-docs-template: &build-docs-template
  #image: ubuntu-latest
  stage: build-docs
  variables:
  script:
    - echo Failure!
    - exit 1

build-and-test:
  <<: *build-and-test-template
  needs: []
    
check-formatting:
  <<: *check-formatting-template
  needs: []
    
build-docs:
  <<: *build-docs-template
  needs: []
