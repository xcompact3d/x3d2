name: "x3d2bot: Fix Style"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix-style:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@x3d2bot fix style')
    runs-on: ubuntu-latest

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);

      - name: Comment that fix is in progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'On it -- running fprettify to fix style issues.'
            });

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - run: pip install fprettify

      - name: Run fprettify and push if changed
        id: fix
        run: |
          fprettify --config .fprettify.ini --recursive src
          if ! git diff --quiet; then
            git config user.name "x3d2bot"
            git config user.email "x3d2bot@users.noreply.github.com"
            git add -A
            git commit -m "style: apply fprettify formatting fixes"
            git push
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment if nothing to fix
        if: steps.fix.outputs.fixed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Nothing to fix -- formatting already passes check-formatting.'
            });
